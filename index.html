<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Educatia.AI — Copilul tău învață despre viitor.</title>
<meta name="description" content="Platformă educațională cu AI pentru copii 6-12 ani. Lecții personalizate construite din emoji. 20 de minute pe zi." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          serif: ['Fraunces', 'ui-serif', 'Georgia', 'serif'],
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        },
        colors: {
          cream: '#FBF8F3',
          creamdark: '#F4EFE6',
          ink: '#1B1A17',
          muted: '#6E685E',
          line: '#E8E0D1',
          coral: '#FF5B4A',
          coraldark: '#E94635',
        },
      },
    },
  };
</script>

<style>
  html, body {
    background: #FBF8F3;
    color: #1B1A17;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  /* Translucent cream veil for content sections so fixed emoji field drifts through. */
  .sec-veil {
    background: rgba(251,248,243,0.68);
    -webkit-backdrop-filter: blur(1px);
    backdrop-filter: blur(1px);
  }
  body {
    font-size: 18px;
    line-height: 1.7;
    letter-spacing: -0.005em;
    overflow-x: hidden;
  }
  .font-serif {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 50;
    letter-spacing: -0.02em;
  }
  .headline {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-weight: 400;
    line-height: 1.04;
    letter-spacing: -0.028em;
  }
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: #6E685E;
  }
  .btn-coral {
    background: #FF5B4A;
    color: #fff;
    transition: transform .18s ease, box-shadow .22s ease, background .2s ease;
    box-shadow: 0 1px 2px rgba(27,26,23,.08), 0 8px 20px -6px rgba(255,91,74,.45);
  }
  .btn-coral:hover {
    transform: translateY(-1px);
    background: #E94635;
    box-shadow: 0 2px 3px rgba(27,26,23,.1), 0 14px 28px -8px rgba(255,91,74,.55);
  }
  .btn-coral:active { transform: translateY(0); }

  .input-warm {
    background: #fff;
    border: 1px solid #E8E0D1;
    transition: border-color .2s ease, box-shadow .22s ease, background .2s ease;
  }
  .input-warm:focus {
    outline: none;
    border-color: #FF5B4A;
    box-shadow: 0 0 0 4px rgba(255,91,74,0.12), 0 1px 2px rgba(27,26,23,0.04);
  }

  .soft-card {
    background: #fff;
    border: 1px solid #EFE7D6;
    box-shadow:
      0 1px 0 rgba(27,26,23,.02),
      0 4px 10px -6px rgba(27,26,23,.08),
      0 20px 40px -24px rgba(27,26,23,.12);
  }

  .soft-card-warm {
    background: #FDFBF6;
    border: 1px solid #EFE7D6;
    box-shadow:
      0 1px 0 rgba(27,26,23,.02),
      0 4px 10px -6px rgba(27,26,23,.06),
      0 20px 40px -24px rgba(27,26,23,.08);
  }

  .hairline { border-color: #E8E0D1; }

  .emoji-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    will-change: transform;
  }
  .emoji-float {
    position: absolute;
    display: inline-block;
    will-change: transform, opacity;
    user-select: none;
    filter: drop-shadow(0 6px 10px rgba(27,26,23,0.06));
  }

  /* sinusoidal floating — each emoji gets offset via inline --delay and --dur */
  @keyframes bob {
    0%   { transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)); }
    50%  { transform: translate3d(0, -14px, 0) rotate(calc(var(--rot, 0deg) * -1)); }
    100% { transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)); }
  }
  .emoji-bob {
    animation: bob var(--dur, 6s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  /* Accordion */
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary { list-style: none; }
  .faq-item[open] .faq-plus::before { transform: rotate(90deg); }
  .faq-plus { position: relative; width: 16px; height: 16px; }
  .faq-plus::after, .faq-plus::before {
    content: ""; position: absolute; top: 50%; left: 0; right: 0;
    height: 1.5px; background: #1B1A17; transform-origin: center;
    transition: transform .25s ease;
  }
  .faq-plus::before { transform: rotate(90deg); }
  .faq-item[open] .faq-plus::before { transform: rotate(0deg); }

  /* Marginalia annotation */
  .marginalia {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: #B44A3C;
    opacity: .85;
    transform: rotate(-3deg);
  }

  /* Link underline */
  .link-underline {
    background-image: linear-gradient(currentColor, currentColor);
    background-repeat: no-repeat;
    background-size: 100% 1px;
    background-position: 0 100%;
    padding-bottom: 1px;
    transition: background-size .25s ease;
  }
  .link-underline:hover { background-size: 0% 1px; }

  /* Wink pulse */
  @keyframes wink {
    0%, 90%, 100% { transform: scale(1) rotate(var(--rot, 0deg)); }
    93% { transform: scale(1.35) rotate(calc(var(--rot, 0deg) + 8deg)); }
    96% { transform: scale(.95) rotate(calc(var(--rot, 0deg) - 4deg)); }
  }
  .emoji-wink {
    animation: wink 11s ease-in-out infinite;
    animation-delay: var(--wink-delay, 2s);
  }

  /* Section divider */
  .divider-dot {
    width: 4px; height: 4px; border-radius: 99px;
    background: #C7BFAE;
  }

  /* Submit success */
  @keyframes checkpop {
    0% { transform: scale(.3); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .check-pop { animation: checkpop .5s cubic-bezier(.2,.8,.2,1.2) forwards; }

  /* Pull quote */
  .pullquote {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144, "SOFT" 40;
    letter-spacing: -0.02em;
    line-height: 1.18;
  }

  @media (prefers-reduced-motion: reduce) {
    .emoji-bob, .emoji-wink { animation: none !important; }
    * { transition-duration: 0.001ms !important; }
  }

  /* Small textural grain */
  .grain::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: .35;
    mix-blend-mode: multiply;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(27,26,23,0.035) 1px, transparent 0);
    background-size: 3px 3px;
  }

  /* Email form flash on focus-within */
  .email-row:focus-within { box-shadow: 0 0 0 4px rgba(255,91,74,0.12); }

  /* Remove default details marker Firefox */
  details > summary { list-style: none; }

  /* Button pulse subtle on idle */
  @keyframes attentionPulse {
    0%, 100% { box-shadow: 0 1px 2px rgba(27,26,23,.08), 0 8px 20px -6px rgba(255,91,74,.45); }
    50%      { box-shadow: 0 1px 2px rgba(27,26,23,.08), 0 12px 26px -6px rgba(255,91,74,.6); }
  }

  /* Cursor text for email */
  input[type="email"]::placeholder { color: #9E978A; }
</style>
</head>
<body class="antialiased">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>

<script type="text/babel" src="src/emoji.jsx"></script>
<script type="text/babel" src="src/countdown.jsx"></script>
<script type="text/babel" src="src/hero.jsx"></script>
<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/faq.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
